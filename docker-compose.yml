services:
  backend:
    build:
      context: ./backend
    ports:
      - '5000:5000'
    env_file:
      - .env
    environment:
      - PORT=5000
      - FRONTEND_ORIGIN=http://localhost:3000
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${REACT_APP_API_URL:-http://localhost:5000}
    ports:
      - '3000:80'
    depends_on:
      - backend
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
